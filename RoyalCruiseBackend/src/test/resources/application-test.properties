# A tesztprofil dinamikusan inditott PostgreSQL kontenert hasznal (Testcontainers JDBC driverrel).
spring.datasource.url=jdbc:tc:postgresql:16-alpine:///royalcruise_test
spring.datasource.driverClassName=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.username=test
spring.datasource.password=test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=my-test-secret-key-that-is-long-enough-for-256-bits
app.jwt.expiration=3600000

