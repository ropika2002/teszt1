# Eles adatbazis-kapcsolat: minden erzekeny erteket kotelezoen kornyezeti valtozobol var.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:royalcruise}
# PostgreSQL JDBC driver hasznalata.
spring.datasource.driverClassName=org.postgresql.Driver
# Eles felhasznalonev kizarolag DB_USER kornyezeti valtozobol.
spring.datasource.username=${DB_USER}
# Eles jelszo kizarolag DB_PASSWORD kornyezeti valtozobol.
spring.datasource.password=${DB_PASSWORD}
# Eles kornyezetben csak validalja a semat, nem modositja automatikusan.
spring.jpa.hibernate.ddl-auto=validate
