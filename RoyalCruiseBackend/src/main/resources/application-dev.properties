# Fejlesztoi adatbazis-kapcsolat PostgreSQL-hez, kornyezeti valtozokbol felepitve.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:royalcruise}
# A PostgreSQL JDBC driver explicit megadasa.
spring.datasource.driverClassName=org.postgresql.Driver
# Fejlesztoi profilban elsokent DB_USER, ennek hianyaban PGUSER, vegul postgres az alapertelemezett.
spring.datasource.username=${DB_USER:${PGUSER:postgres}}
# Jelszo feloldasa DB_PASSWORD-bol, majd PGPASSWORD-bol; hiany eseten ures ertekkel indul.
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD:}}
# A Hibernate fejlesztoi kornyezetben automatikusan igazitja a semat (tabla/oszlop letrehozas-modositas).
spring.jpa.hibernate.ddl-auto=update
