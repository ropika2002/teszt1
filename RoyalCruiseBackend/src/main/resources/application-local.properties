# Helyi gepen futo adatbazis elerese; host/port/nev felulirhato kornyezeti valtozokkal.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:royalcruise}
# JDBC driver beallitasa PostgreSQL adatbazishoz.
spring.datasource.driverClassName=org.postgresql.Driver
# Helyi profil felhasznaloneve: ha DB_USER nincs megadva, a postgres lesz hasznalva.
spring.datasource.username=${DB_USER:postgres}
# Helyi jelszo: ha DB_PASSWORD nincs beallitva, a megadott fallback erteket hasznalja.
spring.datasource.password=${DB_PASSWORD:SZIKSZI_2026_}
# A lokalis fejleszteshez a Hibernate modosithatja a semat az entitasok alapjan.
spring.jpa.hibernate.ddl-auto=update